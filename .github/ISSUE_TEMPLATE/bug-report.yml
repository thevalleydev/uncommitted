name: "🐛 Bug Report"
description: Report a bug or issue with the site
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Fill out the details below and the bug conductor will investigate.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: "e.g., The blog post date shows as one day earlier than expected"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to the blog page
        2. Click on an article
        3. Look at the date displayed
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: "The date should match the date in the article's frontmatter"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: "The date shows as March 3 instead of March 4"
    validations:
      required: true

  - type: input
    id: affected-files
    attributes:
      label: Affected Files (optional)
      description: If you know which files might be involved, list them here.
      placeholder: "e.g., components/BlogCard.vue, pages/blog/[...slug].vue"
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Minor (cosmetic or low impact)
        - Moderate (affects functionality but has workaround)
        - Major (breaks core functionality)
        - Critical (site is unusable)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment (optional)
      description: Browser, OS, or any relevant environment details.
      placeholder: |
        - Browser: Chrome 120
        - OS: Windows 11
        - Device: Desktop
    validations:
      required: false
