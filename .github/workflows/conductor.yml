# Article Conductor
# Triggered when an issue is labeled "article".
# Assigns the issue to the Copilot coding agent, which uses the repo's
# copilot-instructions.md and agent skill files to research, write, and
# submit a pull request with the new article.
name: Article Conductor

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  conductor:
    if: github.event.label.name == 'article'
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '**Article conductor activated.** Here is the plan:',
                '',
                '1. Research the topic described in this issue',
                '2. Draft an SEO spec (target keywords, meta description, JSON-LD type)',
                '3. Write the article following [writing-style guidelines](/.github/agents/writing-style.md)',
                '4. Run the [content quality checklist](/.github/agents/content-quality.md)',
                '5. Open a PR for review',
                '',
                'Assigning to Copilot now. Sit tight.'
              ].join('\n')
            });

      - name: Assign to Copilot
        uses: actions/github-script@v7
        with:
          script: |
            // Assign the issue to the copilot coding agent.
            // The agent will read .github/copilot-instructions.md and
            // the files in .github/agents/ to produce the article.
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: ['copilot-swe-agent[bot]']
              });
            } catch (e) {
              // Fallback: try the copilot app name
              console.log('Primary assignee failed, trying fallback:', e.message);
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: ['copilot[bot]']
              });
            }
