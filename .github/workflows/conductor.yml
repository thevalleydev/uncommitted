# Article Conductor
# Triggered when an issue is labeled "article".
# Mentions @copilot to trigger the coding agent, which uses the repo's
# copilot-instructions.md and agent skill files to research, write, and
# submit a pull request with the new article.
name: Article Conductor

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  conductor:
    if: github.event.label.name == 'article'
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge issue
        uses: actions/github-script@v7
        with:
          script: |
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '**Article conductor activated.** Here is the plan:',
                '',
                '1. Research the topic described in this issue',
                '2. Draft an SEO spec (target keywords, meta description, JSON-LD type)',
                `3. Write the article following [writing-style guidelines](${repoUrl}/.github/agents/writing-style.md)`,
                `4. Run the [content quality checklist](${repoUrl}/.github/agents/content-quality.md)`,
                '5. Open a PR for review',
                '',
                'Triggering Copilot now. Sit tight.'
              ].join('\n')
            });

      - name: Trigger Copilot
        uses: actions/github-script@v7
        with:
          script: |
            // Mention @copilot to trigger the coding agent to start working.
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '@copilot Please write an article based on this issue.',
                '',
                '**Required reading before writing:**',
                `- [Writing Style Guide](${repoUrl}/.github/agents/writing-style.md) - Voice, tone, banned phrases`,
                `- [Content Quality Checklist](${repoUrl}/.github/agents/content-quality.md) - Must pass all checks`,
                `- [SEO Specification](${repoUrl}/.github/agents/seo-spec.md) - Metadata requirements`,
                `- [Main Instructions](${repoUrl}/.github/copilot-instructions.md) - Overall guidance`,
                '',
                'When done, open a PR with `Closes #' + context.issue.number + '` in the body.'
              ].join('\n')
            });
